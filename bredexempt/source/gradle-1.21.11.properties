# Build knobs for the MC 1.21.11 generation. Loaded by the root build.gradle when the build
# runs with -Pgen=1.21.11; without it the values in gradle.properties (26.x) apply.
#
# Only values that DIFFER between generations belong here. mod_version deliberately does NOT
# — it is one number for the whole mod, shared by every generation's jars.
#
# Why each of these differs is recorded in
#   notes.claude/research/1.21.11-build-recipe-PROVEN.md

minecraft_version=1.21.11

# 1.21.11 is OBFUSCATED, so the remapping Loom plugin and a mappings source are both
# required. 26.x is unobfuscated and uses loom-no-remap with no mappings at all.
loom_plugin=dev.architectury.loom
needs_remap=true

# 1.21.11 runs on Java 21 (Mojang manifest javaVersion.majorVersion=21); 26.x needs 25.
# Mixin refuses a compatibilityLevel above the running JVM, so this cannot be hardcoded.
java_release=21
mixin_compat=JAVA_21

# Loader-metadata dependency ranges. CAPPED on purpose: these jars are built for the 1.21.x
# line and must never load on 26.x. An open-ended ">=1.21.6" would let them try, because
# semver ranks 26.1 ABOVE 1.21.11.
#
# ⚠ THE TWO LOADERS HAVE DIFFERENT FLOORS, and not by choice — it is structural:
#   Fabric   jars are remapped to INTERMEDIARY. Intermediary tracks a class by id
#            (ThrownEgg = class_1681), which survives Mojang renaming or MOVING it.
#   NeoForge jars keep OFFICIAL Mojang names, so a package move breaks them outright.
# ThrownEgg moved into ...projectile.throwableitemprojectile in 1.21.11; on 1.21.8/.9/.10 it
# is still ...projectile.ThrownEgg. Proven live 2026-07-20: the Fabric jar runs on 1.21.6,
# and the same build on NeoForge 1.21.8 died with ClassNotFoundException on that very class.
# Do not "tidy" these into one range.
mc_depend_fabric=>=1.21.6 <1.22
mc_depend_neoforge=[1.21.11,1.22)
# fabric-api versions are per-MC-version and NOT comparable across them: 1.21.6 ships
# 0.128.2, 1.21.11 ships 0.141.5. The floor must be the MINIMUM across the declared range,
# or the mod refuses to load on the oldest version it claims to support (hit live).
fapi_depend=>=0.128.2
nf_depend=[21.11,22)

# Verified supported range for the jar filename (+mc<range>) — per loader, because the two
# ranges genuinely differ. build.sh falls back to mc_range when a loader has no override.
mc_range=1.21.11
mc_range_fabric=1.21.6-1.21.11
mc_range_neoforge=1.21.11
