# Dependency pins for the MC 1.21.11 generation. Selected by settings.gradle when the build
# runs with -Pgen=1.21.11; the unsuffixed libs.versions.toml is the 26.x generation.
#
# These are NOT interchangeable with the 26.x pins — 1.21.11 is the last obfuscated MC
# release, so its Fabric artifacts are published in the intermediary namespace while 26.x
# artifacts use official Mojang names.
[versions]
neoforge = "21.11.44"
fabric-loader = "0.19.3"          # same loader serves both generations
fabric-api = "0.141.5+1.21.11"
architectury = "19.0.1"
# sponge-mixin must be declared explicitly on this generation: the remapping Loom plugin does
# not inject it, unlike loom-no-remap used for 26.x.
sponge-mixin = "0.17.3+mixin.0.8.7"

[libraries]
neoforge = { module = "net.neoforged:neoforge", version.ref = "neoforge" }
fabric-loader = { module = "net.fabricmc:fabric-loader", version.ref = "fabric-loader" }
fabric-api = { module = "net.fabricmc.fabric-api:fabric-api", version.ref = "fabric-api" }
architectury-api = { module = "dev.architectury:architectury", version.ref = "architectury" }
architectury-fabric = { module = "dev.architectury:architectury-fabric", version.ref = "architectury" }
architectury-neoforge = { module = "dev.architectury:architectury-neoforge", version.ref = "architectury" }
sponge-mixin = { module = "net.fabricmc:sponge-mixin", version.ref = "sponge-mixin" }
